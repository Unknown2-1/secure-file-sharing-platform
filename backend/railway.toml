[railway]
  plugin = ["postgresql"]

[postgresql]
  version = "15"

[build]
  builder = "NIXPACKS"
  nixpacksVersion = "1.21.0"

[nixpacks]
  plan = "dotnet-10"
  install = "dotnet restore src/VaultShare.Api/VaultShare.Api.csproj"
  build = "dotnet publish src/VaultShare.Api/VaultShare.Api.csproj -c Release -o /app/result"
  start = "dotnet VaultShare.Api.dll"

[deploy]
  port = 8080
  healthcheckPath = "/health/live"
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 10

[deploy.env]
  ASPNETCORE_ENVIRONMENT = "Production"
  SEED_DEMO_DATA = "false"
  FILE_ENCRYPTION_KEY_ID = "prod-v1"
  CLAMAV_FAIL_CLOSED = "false"
