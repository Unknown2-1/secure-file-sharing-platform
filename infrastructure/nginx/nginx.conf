worker_processes auto;
pid /var/run/nginx.pid;

events { worker_connections 1024; }

http {
  server_tokens off;
  client_max_body_size 8m;
  log_format redacted '$remote_addr - $request_method $uri $status $request_id';
  access_log /dev/stdout redacted;
  error_log /dev/stderr warn;

  upstream api { server api:8080; }
  upstream frontend { server frontend:3000; }

  map $http_x_forwarded_proto $vaultshare_forwarded_proto {
    default $scheme;
    https https;
  }

  server {
    listen 8080;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;

    location /api/ {
      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $vaultshare_forwarded_proto;
      proxy_set_header X-Request-ID $request_id;
    }
    location /health/ {
      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $vaultshare_forwarded_proto;
    }
    location /s/ {
      access_log off;
      proxy_pass http://frontend;
      add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
      add_header Referrer-Policy no-referrer always;
    }
    location / { proxy_pass http://frontend; }
  }
}
