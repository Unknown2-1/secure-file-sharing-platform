name: vaultshare

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vaultshare}
      POSTGRES_USER: ${POSTGRES_USER:-vaultshare}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local-only-change-me}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql
    networks: [backend]

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${OBJECT_STORAGE_ACCESS_KEY:-vaultshare-local}
      MINIO_ROOT_PASSWORD: ${OBJECT_STORAGE_SECRET_KEY:-local-only-change-me}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - minio-data:/data
    networks: [backend]

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/scripts/init-minio.sh"]
    environment:
      OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY:-vaultshare-local}
      OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY:-local-only-change-me}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-vaultshare-encrypted}
    volumes:
      - ./infrastructure/scripts/init-minio.sh:/scripts/init-minio.sh:ro
    networks: [backend]

  clamav:
    image: clamav/clamav:1.4
    healthcheck:
      test: ["CMD", "/usr/local/bin/clamdcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 120s
    volumes:
      - clamav-data:/var/lib/clamav
    networks: [backend]

  mailpit:
    image: axllent/mailpit:v1.27
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ACCEPT_ANY: "1"
      MP_SMTP_AUTH_ALLOW_INSECURE: "1"
    ports:
      - "127.0.0.1:8025:8025"
    networks: [backend]

  temp-uploads-init:
    image: alpine:3.23
    command: ["sh", "-ec", "chown -R 100:101 /uploads && chmod 750 /uploads"]
    volumes:
      - temp-uploads:/uploads
    networks: [backend]

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    env_file: [.env]
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      clamav:
        condition: service_healthy
      temp-uploads-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health/live"]
      interval: 10s
      timeout: 3s
      retries: 10
    read_only: true
    tmpfs: [/tmp]
    volumes:
      - temp-uploads:/var/lib/vaultshare/uploads
    networks: [backend, edge]

  worker:
    build:
      context: .
      dockerfile: infrastructure/docker/worker.Dockerfile
    env_file: [.env]
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      clamav:
        condition: service_healthy
      temp-uploads-init:
        condition: service_completed_successfully
    read_only: true
    tmpfs: [/tmp]
    volumes:
      - temp-uploads:/var/lib/vaultshare/uploads
    networks: [backend]

  frontend:
    build:
      context: .
      dockerfile: infrastructure/docker/frontend.Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    depends_on:
      api:
        condition: service_healthy
    networks: [edge]

  proxy:
    image: nginx:1.28-alpine
    ports:
      - "8080:8080"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_started
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
    networks: [edge]

volumes:
  postgres-data:
  minio-data:
  clamav-data:
  temp-uploads:

networks:
  backend:
    internal: true
  edge:
