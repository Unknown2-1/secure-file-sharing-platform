name: Container Build
on:
  push:
    paths: ["backend/**", "frontend/**", "infrastructure/**", "docker-compose*.yml", ".github/workflows/container-build.yml"]
  pull_request:
    paths: ["backend/**", "frontend/**", "infrastructure/**", "docker-compose*.yml"]
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: api
            dockerfile: infrastructure/docker/api.Dockerfile
          - name: worker
            dockerfile: infrastructure/docker/worker.Dockerfile
          - name: frontend
            dockerfile: infrastructure/docker/frontend.Dockerfile
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          tags: vaultshare/${{ matrix.name }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
